<!DOCTYPE html>
<html lang="pt-br">

    <head>

        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="output.css">
        <title> My Book List - Perfil </title>

    </head>


    <body>

        <nav class="w-screen flex justify-between p-3">
            <h1> My Book List </h1>

            <div class="flex gap-4">
                <a href="/"> Seu perfil </a>

                <a href="/book"> Books </a>

                <a href="/cadastro"> Login / Cadastro </a>
            </div>
        </nav>

        <main>

            <div>
                <div id="lista-topo">
                    <h2 id="lista-user">
                        Lista de [user.nome]
                    </h2>
                </div>

                <div id="lista">
                    <div class="book">

                        <div class="book-container">
                            <div class="texto-container">
                                <p class="numero"> 1 </p>

                                <div class="book-texto">
                                    <h3 class="book-nome"> O Cortiço </h3>
                                    <h4 class="book-autor"> Aluísio Azevedo </h4>
                                </div>
                            </div>

                            <div class="book-dados">
                                <h3 class="book-score"> 8 </h3>
                                <h3 class="book-progress"> 16/16 </h3>

                                <div class="book-btns">
                                    <button id="book-edit-btn"> Edit </button>
                                    <button id="book-remove-btn"> X </button>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>

        </main>

    </body>

</html>
